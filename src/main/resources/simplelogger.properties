# SLF4J Simple Logger Configuration
# Default log level (can be overridden by --log-level CLI option)
org.slf4j.simpleLogger.defaultLogLevel=info

# Show timestamp
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS

# Show level in brackets for better readability
org.slf4j.simpleLogger.levelInBrackets=true

# Show short class name (e.g., TaosectScraper instead of full package)
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=true

# Don't show thread name (cleaner output for CLI)
org.slf4j.simpleLogger.showThreadName=false

# Output format will be: [HH:mm:ss.SSS] [LEVEL] ShortClassName - message
# Example: [14:23:45.123] [INFO] TaosectScraper - Fetching chapters for manga: one-punch-man
